project_name:
  type: str
  help: What is your project name?

sdm:
  type: str
  help: What software deployment method do you want to use?
  choices:
    - conda
    - apptainer
    - both
    - None / Don't know yet

use_profiles:
  type: bool
  help: Would you like to set up a default profile?

use_report:
  type: bool
  default: true
  help: Would you like to use snakemake for automated report generation?

